repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: ["backend/app"]
        additional_dependencies:
          - fastapi==0.115.6
          - pydantic-settings==2.7.1
          - sqlalchemy>=2.0.45,<2.1
