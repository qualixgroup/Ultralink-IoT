services:
  postgres:
    image: postgres:16-alpine
    container_name: ultralink-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ultralink_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-ultralink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ultralink}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ultralink} -d ${POSTGRES_DB:-ultralink_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ultralink-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  thingsboard:
    image: thingsboard/tb-postgres:latest
    container_name: ultralink-thingsboard
    ports:
      - "${THINGSBOARD_PORT:-8080}:9090"
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - thingsboard_data:/data
      - thingsboard_logs:/var/log/thingsboard

  backend:
    build:
      context: ../backend
    container_name: ultralink-backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ultralink}:${POSTGRES_PASSWORD:-ultralink}@postgres:5432/${POSTGRES_DB:-ultralink_monitor}
      REDIS_URL: redis://redis:6379/0
      THINGSBOARD_BASE_URL: http://thingsboard:9090
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      thingsboard:
        condition: service_started

  frontend:
    build:
      context: ../frontend
    container_name: ultralink-frontend
    environment:
      VITE_API_URL: http://127.0.0.1:${BACKEND_PORT:-8000}/api/v1
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  thingsboard_data:
  thingsboard_logs:
